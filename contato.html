        <section class="formulario">
            <div class="container-formulario">
                <h1>ENTRE EM CONTATO</h1>
                <p id="mensagem-saudacao">Saudações, viajante! Como podemos ajudar?</p>
                <form id="formulario">
                    <div class="campos">
                        <label for="nome">Nome do viajante:</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome..." required>
                    </div>
                    <div class="campos">
                        <label for="email">Defina seu mensageiro (email)</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="campos">
                        <label for="mensagem">Sua Mensagem: </label>
                        <textarea id="mensagem" name="mensagem" rows="5" placeholder="Nos conte sobre a sua jornada..." required></textarea>
                    </div>
                    <button type="submit" class="btn-jogar">Enviar Mensagem</button>
                </form>
            </div>

        </section>
